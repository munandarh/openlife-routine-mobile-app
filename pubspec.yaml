name: openlife_routine
description: Privacy-first, offline-first daily routine reminder app built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  cupertino_icons: ^1.0.8
  drift: ^2.34.0
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_local_notifications: ^22.0.1
  go_router: ^17.3.0
  intl: ^0.20.3
  path: ^1.9.1
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  sqlite3_flutter_libs: ^0.6.0+eol
  timezone: ^0.11.1

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
