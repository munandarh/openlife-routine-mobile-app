<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar Shell -->

<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary text-[28px]" data-icon="spa">spa</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">OpenLife Routine</h1>
</div>
<button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-soft transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-page-margin pb-32 text-center">
<!-- Illustration Container -->

<div class="absolute inset-0 bg-primary-soft/30 rounded-full blur-3xl scale-75"></div>

</div>

<span class="material-symbols-outlined text-secondary" data-icon="star">star</span>

</div>

                Complete your first few routines to see your consistency and progress trends here.
            </p>

</button>

<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-label-md text-label-md">Settings</span>
</button>

<script>
        // Simple Micro-interaction for the 'Start Routine' button hover
        const startBtn = document.querySelector('button.bg-primary');
        if (startBtn) {
            startBtn.addEventListener('mouseenter', () => {
                startBtn.classList.add('px-2xl');
            });
            startBtn.addEventListener('mouseleave', () => {
                startBtn.classList.remove('px-2xl');
            });
        }

        // Handle navigation active states (Visual only for this mockup)
        const navButtons = document.querySelectorAll('nav button');
        navButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                navButtons.forEach(b => {
                    b.className = "flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all duration-300 ease-out";
                    const icon = b.querySelector('.material-symbols-outlined');
                    if (icon) icon.style.fontVariationSettings = "'FILL' 0";
                });
                
                btn.className = "flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-5 py-1 transition-all duration-300 ease-out";
                const icon = btn.querySelector('.material-symbols-outlined');
                if (icon) icon.style.fontVariationSettings = "'FILL' 1";
            });
        });
    </script>
