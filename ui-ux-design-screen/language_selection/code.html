<body class="bg-background text-on-background min-h-screen flex flex-col overflow-x-hidden">
<!-- Top App Bar -->
<header class="w-full top-0 sticky bg-background dark:bg-inverse-surface z-50 flex items-center justify-between px-page-margin py-md">
<div class="flex items-center gap-md">
<button aria-label="Go back" class="p-xs rounded-full hover:bg-surface-soft transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">OpenLife Routine</h1>
</div>
</header>
<main class="flex-grow container mx-auto max-w-lg px-page-margin pt-xl pb-3xl">
<!-- Hero Section / Title -->
<div class="mb-2xl">
<h2 class="font-display-lg-mobile text-display-lg-mobile text-on-surface mb-sm">Choose Your Language</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Select the language that feels most comfortable for your daily routines.</p>
</div>
<!-- Language Options Container -->
<div class="space-y-lg">
<!-- English Option -->
<label class="group relative block cursor-pointer">
<input checked="" class="peer hidden" name="language" type="radio" value="english"/>
<div class="glass-card p-xl rounded-[24px] flex items-center justify-between transition-all duration-300 border-2 border-transparent peer-checked:border-primary-container peer-checked:bg-primary-soft/30 hover:bg-surface-container-low shadow-[0px_8px_24px_rgba(142,170,94,0.06)]">
<div class="flex items-center gap-xl">
<div class="w-12 h-12 rounded-full bg-accent-soft flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="language">language</span>
</div>
<div>
<p class="font-title-sm text-title-sm text-on-surface">English</p>
<p class="font-body-md text-body-md text-on-surface-variant">System Default</p>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-white text-[18px] opacity-0 peer-checked:opacity-100" data-icon="check" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
</label>
<!-- Indonesian Option -->
<label class="group relative block cursor-pointer">
<input class="peer hidden" name="language" type="radio" value="indonesian"/>
<div class="glass-card p-xl rounded-[24px] flex items-center justify-between transition-all duration-300 border-2 border-transparent peer-checked:border-primary-container peer-checked:bg-primary-soft/30 hover:bg-surface-container-low shadow-[0px_8px_24px_rgba(142,170,94,0.06)]">
<div class="flex items-center gap-xl">
<div class="w-12 h-12 rounded-full bg-secondary-soft flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="translate">translate</span>
</div>
<div>
<p class="font-title-sm text-title-sm text-on-surface">Bahasa Indonesia</p>
<p class="font-body-md text-body-md text-on-surface-variant">Indonesian</p>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-all">
<!-- Custom radio mark for unselected using CSS or Material Icons -->
<div class="peer-checked:hidden w-2 h-2 rounded-full bg-transparent"></div>
</div>
</div>
</label>
</div>
<!-- Visual Decorative Area -->
<div class="mt-3xl relative flex justify-center">
<div class="absolute -z-10 w-48 h-48 bg-primary-soft/20 rounded-full blur-3xl"></div>
<div class="w-full aspect-square max-h-64 rounded-[32px] overflow-hidden bg-surface-container border border-border flex items-center justify-center relative">
<!-- Abstract "Calm Productivity" Graphic -->
<div class="flex flex-col items-center text-center p-xl">
<div class="w-20 h-20 rounded-full bg-white flex items-center justify-center mb-lg shadow-sm">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="spa">spa</span>
</div>
<p class="font-title-sm text-title-sm text-primary">Peaceful Structure</p>
<p class="font-body-md text-body-md text-on-surface-variant px-lg">Focus on what matters most in any language.</p>
</div>
<!-- Tiny floating chips for visual flair -->
<div class="absolute top-4 right-4 bg-accent-soft px-sm py-xs rounded-full shadow-sm animate-bounce" style="animation-duration: 3s;">
<span class="material-symbols-outlined text-tertiary text-sm" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
</div>
<!-- Sticky Bottom Action (But inline with main flow for this layout) -->
<div class="mt-2xl flex flex-col gap-lg">
<button class="w-full bg-primary text-on-primary py-lg rounded-full font-title-sm text-title-sm hover:opacity-90 active:scale-[0.98] transition-all shadow-[0px_8px_24px_rgba(142,170,94,0.12)]">
                Confirm Selection
            </button>
<button class="w-full bg-transparent text-primary py-md rounded-full font-body-lg text-body-lg hover:bg-primary-soft transition-colors">
                Skip for now
            </button>
</div>
</main>
<!-- Decorative spacer to avoid content overlap with nav if it existed -->
<div class="h-xl"></div>
<script>
        // Micro-interaction for radio buttons
        const inputs = document.querySelectorAll('input[name="language"]');
        inputs.forEach(input => {
            input.addEventListener('change', (e) => {
                // Potential for haptic feedback or sound trigger here
                console.log('Selected language:', e.target.value);
                
                // Add a little bounce to the selection icon
                const parent = e.target.closest('label');
                const checkIcon = parent.querySelector('.material-symbols-outlined[data-icon="check"]');
                if(checkIcon) {
                    checkIcon.classList.remove('scale-100');
                    checkIcon.classList.add('scale-125');
                    setTimeout(() => checkIcon.classList.remove('scale-125'), 200);
                }
            });
        });
    </script>
