<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Routine - OpenLife Routine</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#c39b42",

                        "surface-container": "#f5ece5",
                        "danger": "#E57373",
                        "on-tertiary": "#ffffff",
                        "sleep-purple": "#9B86BD",
                        "on-secondary-fixed": "#001e30",
                        "on-primary-fixed-variant": "#374e0b",
                        "secondary-soft": "#DDEBF5",
                        "primary-fixed-dim": "#b3d180",
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "inverse-primary": "#b3d180",
                        "secondary-fixed": "#cbe6ff",
                        "surface-container-lowest": "#ffffff",
                        "border": "#E5DDD3",
                        "on-tertiary-fixed-variant": "#5c4300",
                        "surface-bright": "#fff8f3",
                        "on-error": "#ffffff",
                        "surface-container-low": "#fbf2ea",
                        "surface-soft": "#F0EAE2",
                        "on-error-container": "#93000a",
                        "surface-variant": "#eae1da",
                        "on-secondary-fixed-variant": "#1e4a68",
                        "secondary": "#396281",
                        "surface-container-high": "#efe7df",
                        "tertiary-fixed-dim": "#edc063",
                        "on-primary-fixed": "#131f00",
                        "on-secondary-container": "#355f7e",
                        "on-tertiary-container": "#493400",
                        "surface": "#FFFFFF",
                        "primary-soft": "#DDE8C8",
                        "surface-container-highest": "#eae1da",
                        "primary-container": "#8eaa5e",
                        "on-tertiary-fixed": "#261900",
                        "primary-fixed": "#cfed9a",
                        "outline": "#75796a",
                        "on-surface": "#1f1b17",
                        "tertiary": "#795900",
                        "surface-dim": "#e1d9d1",

                        "success": "#34C759",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "card-gap": "16px",
                        "xl": "24px",
                        "sm": "8px",
                        "page-margin": "24px",
                        "md": "12px",
                        "lg": "16px",
                        "unit": "4px",
                        "2xl": "32px",
                        "xs": "4px",
                        "3xl": "40px"
                    },
                    "fontFamily": {
                        "display-lg-mobile": ["Plus Jakarta Sans"],
                        "badge-sm": ["Plus Jakarta Sans"],

                        "body-lg": ["15px", { "lineHeight": "22px", "fontWeight": "500" }]

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1; }
        
        /* Custom scrollbar to hide it but keep functionality */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<!-- Suppressed on linear/task-focused flows (back/close actions imply departure), but a custom task header is needed -->
<header class="w-full top-0 sticky bg-background z-10">
<div class="flex justify-between items-center px-page-margin py-md">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-soft transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<h1 class="font-headline-md-mobile text-headline-md-mobile text-primary font-bold">New Routine</h1>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-page-margin pb-3xl pt-lg flex flex-col gap-xl max-w-2xl mx-auto w-full relative">
<!-- Input: Routine Name -->
<section class="flex flex-col gap-sm">
<label class="font-title-sm text-title-sm text-on-background px-xs">Routine Name</label>
<input class="w-full h-16 px-lg bg-surface border border-border rounded-[24px] font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-on-surface-variant/50" placeholder="e.g., Morning Yoga" type="text"/>
</section>
<!-- Category Selector -->
<section class="flex flex-col gap-sm">
<label class="font-title-sm text-title-sm text-on-background px-xs">Category</label>
<div class="grid grid-cols-3 md:grid-cols-6 gap-md">
<!-- Option 1 -->
<button class="flex flex-col items-center justify-center gap-xs py-md bg-surface border border-border rounded-[20px] hover:bg-surface-soft transition-colors focus:ring-2 focus:ring-primary focus:border-transparent group">
<div class="w-10 h-10 rounded-full bg-accent-soft flex items-center justify-center text-tertiary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">restaurant</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Meal</span>
</button>
<!-- Option 2 Active -->
<button class="flex flex-col items-center justify-center gap-xs py-md bg-primary-soft border border-primary-container rounded-[20px] transition-colors focus:ring-2 focus:ring-primary focus:border-transparent group">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-on-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined filled">water_drop</span>
</div>
<span class="font-label-md text-label-md text-primary font-bold">Water</span>
</button>
<!-- Option 3 -->
<button class="flex flex-col items-center justify-center gap-xs py-md bg-surface border border-border rounded-[20px] hover:bg-surface-soft transition-colors focus:ring-2 focus:ring-primary focus:border-transparent group">
<div class="w-10 h-10 rounded-full bg-tertiary-fixed flex items-center justify-center text-tertiary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">medication</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Vitamin</span>
</button>
<!-- Option 4 -->
<button class="flex flex-col items-center justify-center gap-xs py-md bg-surface border border-border rounded-[20px] hover:bg-surface-soft transition-colors focus:ring-2 focus:ring-primary focus:border-transparent group">
<div class="w-10 h-10 rounded-full bg-error-container flex items-center justify-center text-on-error-container group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">vaccines</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Medicine</span>
</button>
<!-- Option 5 -->
<button class="flex flex-col items-center justify-center gap-xs py-md bg-surface border border-border rounded-[20px] hover:bg-surface-soft transition-colors focus:ring-2 focus:ring-primary focus:border-transparent group">
<div class="w-10 h-10 rounded-full bg-secondary-soft flex items-center justify-center text-secondary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">bedtime</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Sleep</span>
</button>
<!-- Option 6 -->
<button class="flex flex-col items-center justify-center gap-xs py-md bg-surface border border-border rounded-[20px] hover:bg-surface-soft transition-colors focus:ring-2 focus:ring-primary focus:border-transparent group">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">fitness_center</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Exercise</span>
</button>
</div>
</section>
<!-- Time Picker (Simplified for design) -->
<section class="flex flex-col gap-sm">
<label class="font-title-sm text-title-sm text-on-background px-xs">Time</label>
<div class="relative">
<input class="w-full h-16 px-lg bg-surface border border-border rounded-[24px] font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors appearance-none" type="time" value="08:00"/>
<div class="absolute right-lg top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined">schedule</span>
</div>
</div>
</section>
<!-- Repeat Days -->
<section class="flex flex-col gap-sm">
<label class="font-title-sm text-title-sm text-on-background px-xs">Repeat</label>
<div class="flex justify-between items-center bg-surface border border-border rounded-[24px] p-md">
<button class="w-10 h-10 rounded-full bg-primary-soft text-primary font-title-sm text-title-sm flex items-center justify-center active:scale-90 transition-transform">M</button>
<button class="w-10 h-10 rounded-full bg-primary-soft text-primary font-title-sm text-title-sm flex items-center justify-center active:scale-90 transition-transform">T</button>
<button class="w-10 h-10 rounded-full bg-primary-soft text-primary font-title-sm text-title-sm flex items-center justify-center active:scale-90 transition-transform">W</button>
<button class="w-10 h-10 rounded-full bg-surface-soft text-on-surface-variant font-title-sm text-title-sm flex items-center justify-center hover:bg-surface-variant active:scale-90 transition-transform">T</button>
<button class="w-10 h-10 rounded-full bg-surface-soft text-on-surface-variant font-title-sm text-title-sm flex items-center justify-center hover:bg-surface-variant active:scale-90 transition-transform">F</button>
<button class="w-10 h-10 rounded-full bg-surface-soft text-on-surface-variant font-title-sm text-title-sm flex items-center justify-center hover:bg-surface-variant active:scale-90 transition-transform">S</button>
<button class="w-10 h-10 rounded-full bg-surface-soft text-on-surface-variant font-title-sm text-title-sm flex items-center justify-center hover:bg-surface-variant active:scale-90 transition-transform">S</button>
</div>
</section>
</main>
<!-- Fixed Bottom Action -->
<div class="fixed bottom-0 left-0 w-full bg-background/90 backdrop-blur-md px-page-margin pb-8 pt-4 flex justify-center z-50">
<div class="max-w-2xl w-full">
<button class="w-full h-14 bg-primary text-on-primary font-title-sm text-title-sm rounded-full active:scale-[0.98] transition-transform flex items-center justify-center shadow-lg">
                Save Routine
            </button>
</div>
</div>
<!-- Navigation Shell suppressed due to transactional nature of 'New Routine' -->
</body></html>
