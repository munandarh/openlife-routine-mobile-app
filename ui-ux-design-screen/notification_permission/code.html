<style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .pulse-glow {
      animation: pulse-ring 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse-ring {
      0% { transform: scale(0.95); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 0.4; }
      100% { transform: scale(0.95); opacity: 0.8; }
    }

    .float-slow {
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    .ripple-surface {
      background: radial-gradient(circle, rgba(142, 170, 94, 0.1) 0%, transparent 70%);
    }
  </style>

<body class="bg-background text-on-background min-h-screen flex items-center justify-center overflow-hidden">
<!-- Suppression of Shell: No TopAppBar or BottomNavBar as requested for transactional/focused journey -->
<main class="relative w-full max-w-[440px] mx-auto px-page-margin flex flex-col items-center justify-center">
<!-- Background Atmospheric Effect -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="ripple-surface absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full blur-3xl opacity-40"></div>
</div>
<!-- Illustration Section -->
<div class="relative w-64 h-64 flex items-center justify-center mb-2xl">
<!-- Animated Background Circles -->
<div class="absolute w-48 h-48 bg-primary-soft rounded-full pulse-glow opacity-30"></div>
<div class="absolute w-64 h-64 bg-primary-soft rounded-full pulse-glow opacity-10" style="animation-delay: 1.5s;"></div>
<!-- Central Bell Illustration Wrapper -->
<div class="relative float-slow flex items-center justify-center">
<div class="bg-surface p-xl rounded-[40px] shadow-[0px_8px_24px_rgba(142,170,94,0.12)] border border-border">
<span class="material-symbols-outlined text-primary text-[80px]" style="font-variation-settings: 'FILL' 1;">
            notifications_active
          </span>
</div>
<!-- Small Accessory Orbs -->
<div class="absolute -top-4 -right-2 w-8 h-8 bg-accent-soft rounded-full border-2 border-surface flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-tertiary text-sm" style="font-variation-settings: 'FILL' 1;">spa</span>
</div>
<div class="absolute -bottom-2 -left-6 w-12 h-12 bg-secondary-soft rounded-full border-2 border-surface flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-secondary text-lg" style="font-variation-settings: 'FILL' 1;">self_improvement</span>
</div>
</div>
</div>
<!-- Text Content -->
<div class="text-center z-10 mb-2xl">
<h1 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-on-background mb-md">
        Stay in your flow
      </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mx-auto">
        Allow notifications to receive gentle reminders for your routines. You can customize or snooze them anytime.
      </p>
</div>
<!-- Feature Bento Minimalist Cards -->
<div class="w-full grid grid-cols-1 gap-lg mb-3xl">
<div class="bg-surface rounded-2xl p-lg border border-border flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-primary-soft flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">check_circle</span>
</div>
<div class="flex flex-col">
<span class="font-title-sm text-title-sm">Smart Reminders</span>
<span class="font-label-md text-label-md text-on-surface-variant">Gentle nudges when it matters.</span>
</div>
</div>
<div class="bg-surface rounded-2xl p-lg border border-border flex items-center gap-md">
<div class="w-10 h-10 rounded-full bg-secondary-soft flex items-center justify-center text-secondary">
<span class="material-symbols-outlined text-[20px]">bedtime</span>
</div>
<div class="flex flex-col">
<span class="font-title-sm text-title-sm">Quiet Hours</span>

</div>
</div>

        Enable Notifications
      </button>
<button class="w-full py-4 bg-surface-soft text-primary rounded-full font-title-sm text-title-sm active:scale-[0.98] transition-all duration-200">
        Maybe Later

</div>

<div class="fixed bottom-0 left-0 w-full h-32 bg-gradient-to-t from-background to-transparent pointer-events-none"></div>
</main>
<script>
    function requestPermission() {
      const btn = event.currentTarget;
      const originalText = btn.innerHTML;
      
      // Micro-interaction simulation
      btn.classList.add('scale-95');
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span>';
      
      setTimeout(() => {
        btn.classList.remove('scale-95');
        btn.innerHTML = '<span class="material-symbols-outlined mr-2">check</span> Enabled';
        btn.classList.remove('bg-primary');
        btn.classList.add('bg-success');
        
        // Trigger subtle haptic-like effect or move to next screen logic
        console.log("Notification permission flow triggered");
      }, 1200);
    }

    // Interactive Floating Element script
    document.addEventListener('mousemove', (e) => {
      const moveX = (e.clientX - window.innerWidth / 2) / 50;
      const moveY = (e.clientY - window.innerHeight / 2) / 50;
      document.querySelector('.float-slow').style.transform = `translate(${moveX}px, ${moveY}px)`;
    });
  </script>
