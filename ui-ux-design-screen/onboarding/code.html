<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('carouselContainer');
            const dot1 = document.getElementById('dot1');
            const dot2 = document.getElementById('dot2');
            const nextBtn = document.getElementById('nextBtn');
            const getStartedBtn = document.getElementById('getStartedBtn');
            const skipBtnBottom = document.getElementById('skipBtnBottom');
            const skipBtnTop = document.getElementById('skipBtnTop');
            
            const slides = container.children;
            const totalSlides = slides.length;
            let currentSlide = 0;

            const updateUI = (index) => {
                currentSlide = index;
                
                // Update dots
                if (index === 0) {
                    dot1.classList.add('active', 'w-lg', 'bg-primary');
                    dot1.classList.remove('w-2', 'bg-surface-dim');
                    dot2.classList.remove('active', 'w-lg', 'bg-primary');
                    dot2.classList.add('w-2', 'bg-surface-dim');
                    
                    nextBtn.classList.remove('hidden');
                    getStartedBtn.classList.add('hidden');
                    skipBtnBottom.classList.remove('hidden');
                } else {
                    dot2.classList.add('active', 'w-lg', 'bg-primary');
                    dot2.classList.remove('w-2', 'bg-surface-dim');
                    dot1.classList.remove('active', 'w-lg', 'bg-primary');
                    dot1.classList.add('w-2', 'bg-surface-dim');
                    
                    nextBtn.classList.add('hidden');
                    getStartedBtn.classList.remove('hidden');
                    skipBtnBottom.classList.add('hidden');
                    skipBtnTop.classList.add('opacity-0', 'pointer-events-none'); // Hide top skip on last slide
                }
            };

            // Handle scroll events to update dots
            container.addEventListener('scroll', () => {
                const scrollPosition = container.scrollLeft;
                const slideWidth = container.offsetWidth;
                const index = Math.round(scrollPosition / slideWidth);
                
                if (index !== currentSlide) {
                    updateUI(index);
                }
            });

            // Button actions
            nextBtn.addEventListener('click', () => {
                container.scrollTo({
                    left: container.offsetWidth,
                    behavior: 'smooth'
                });
            });

            const finishOnboarding = () => {
                // In a real app, this would redirect or close the modal
                console.log('Onboarding complete, transitioning to main app...');
                document.body.style.opacity = '0';
                document.body.style.transition = 'opacity 0.5s ease';
                setTimeout(() => {
                    alert('Transition to Main App Dashboard');
                    document.body.style.opacity = '1';
                }, 500);
            };

            getStartedBtn.addEventListener('click', finishOnboarding);
            skipBtnBottom.addEventListener('click', finishOnboarding);
            skipBtnTop.addEventListener('click', finishOnboarding);
        });
    </script>
