<!DOCTYPE html>

<html lang="en"><head>

<style>

            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        @media (min-width: 768px) {
            .bento-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

                      "inverse-surface": "#34302b",
                      "secondary-soft": "#DDEBF5",
                      "danger": "#E57373",
                      "inverse-primary": "#b3d180",
                      "error-container": "#ffdad6",

                      "success": "#34C759",
                      "primary": "#4d6622",
                      "surface-container-low": "#fbf2ea",
                      "on-background": "#1f1b17",
                      "outline": "#75796a",
                      "on-tertiary": "#ffffff",
                      "on-surface-variant": "#44483c",
                      "surface-container-highest": "#eae1da",
                      "on-error": "#ffffff",

                      "xl": "0.75rem",

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- Header Section (TopAppBar Influence) -->
<header class="w-full top-0 sticky bg-background z-40 flex items-center justify-between px-page-margin py-md">
<div class="flex items-center gap-lg">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-soft transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-background">New Routine</h1>
</div>
<div class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-soft">
<span class="material-symbols-outlined text-primary" data-icon="spa">spa</span>
</div>
</header>
<main class="px-page-margin mt-lg max-w-4xl mx-auto">
<div class="mb-2xl">
<h2 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-on-surface">Choose a Category</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-sm">Select the type of activity you want to track regularly.</p>
</div>
<!-- Category Bento Grid -->
<div class="bento-grid">
<!-- Meal Card -->
<div class="group cursor-pointer bg-surface border border-border rounded-3xl p-xl flex flex-col items-center justify-center aspect-square transition-all duration-300 hover:border-primary-container active:scale-95">
<div class="w-14 h-14 rounded-full bg-orange-50 flex items-center justify-center mb-md group-hover:bg-orange-100 transition-colors">
<span class="material-symbols-outlined text-orange-600 text-3xl" data-icon="restaurant">restaurant</span>
</div>
<span class="font-title-sm text-title-sm text-on-surface">Meal</span>
</div>
<!-- Water Card (Selected) -->
<div class="group cursor-pointer bg-surface border-2 border-primary rounded-3xl p-xl flex flex-col items-center justify-center aspect-square transition-all duration-300 selected-glow active:scale-95">
<div class="w-14 h-14 rounded-full bg-blue-50 flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-blue-600 text-3xl" data-icon="water_drop">water_drop</span>
</div>
<span class="font-title-sm text-title-sm text-primary">Water</span>
<div class="mt-xs bg-primary-soft text-primary px-3 py-0.5 rounded-full">
<span class="text-[10px] font-bold uppercase tracking-wider">Active</span>
</div>
</div>
<!-- Vitamin Card -->
<div class="group cursor-pointer bg-surface border border-border rounded-3xl p-xl flex flex-col items-center justify-center aspect-square transition-all duration-300 hover:border-primary-container active:scale-95">
<div class="w-14 h-14 rounded-full bg-yellow-50 flex items-center justify-center mb-md group-hover:bg-yellow-100 transition-colors">
<span class="material-symbols-outlined text-yellow-600 text-3xl" data-icon="pill">pill</span>
</div>
<span class="font-title-sm text-title-sm text-on-surface">Vitamin</span>
</div>
<!-- Medicine Card -->
<div class="group cursor-pointer bg-surface border border-border rounded-3xl p-xl flex flex-col items-center justify-center aspect-square transition-all duration-300 hover:border-primary-container active:scale-95">
<div class="w-14 h-14 rounded-full bg-red-50 flex items-center justify-center mb-md group-hover:bg-red-100 transition-colors">
<span class="material-symbols-outlined text-red-600 text-3xl" data-icon="medical_services">medical_services</span>
</div>
<span class="font-title-sm text-title-sm text-on-surface">Medicine</span>
</div>
<!-- Sleep Card -->
<div class="group cursor-pointer bg-surface border border-border rounded-3xl p-xl flex flex-col items-center justify-center aspect-square transition-all duration-300 hover:border-primary-container active:scale-95">
<div class="w-14 h-14 rounded-full bg-purple-50 flex items-center justify-center mb-md group-hover:bg-purple-100 transition-colors">
<span class="material-symbols-outlined text-purple-600 text-3xl" data-icon="bedtime">bedtime</span>
</div>
<span class="font-title-sm text-title-sm text-on-surface">Sleep</span>
</div>
<!-- Exercise Card -->
<div class="group cursor-pointer bg-surface border border-border rounded-3xl p-xl flex flex-col items-center justify-center aspect-square transition-all duration-300 hover:border-primary-container active:scale-95">
<div class="w-14 h-14 rounded-full bg-green-50 flex items-center justify-center mb-md group-hover:bg-green-100 transition-colors">
<span class="material-symbols-outlined text-green-600 text-3xl" data-icon="fitness_center">fitness_center</span>
</div>
<span class="font-title-sm text-title-sm text-on-surface">Exercise</span>
</div>
<!-- Break Card -->
<div class="group cursor-pointer bg-surface border border-border rounded-3xl p-xl flex flex-col items-center justify-center aspect-square transition-all duration-300 hover:border-primary-container active:scale-95">
<div class="w-14 h-14 rounded-full bg-teal-50 flex items-center justify-center mb-md group-hover:bg-teal-100 transition-colors">
<span class="material-symbols-outlined text-teal-600 text-3xl" data-icon="coffee">coffee</span>
</div>
<span class="font-title-sm text-title-sm text-on-surface">Break</span>
</div>
<!-- Custom Card -->
<div class="group cursor-pointer bg-surface-soft border border-dashed border-outline-variant rounded-3xl p-xl flex flex-col items-center justify-center aspect-square transition-all duration-300 hover:bg-surface hover:border-primary active:scale-95">
<div class="w-14 h-14 rounded-full bg-white flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-on-surface-variant text-3xl" data-icon="add">add</span>
</div>
<span class="font-title-sm text-title-sm text-on-surface">Custom</span>
</div>
</div>
<!-- Selection Footer -->
<div class="mt-3xl flex flex-col items-center">
<button class="w-full max-w-sm bg-primary text-on-primary py-lg px-2xl rounded-full font-title-sm text-title-sm shadow-lg hover:bg-primary-container transition-all active:scale-95">
                Continue with Water
            </button>
<button class="mt-lg text-primary font-label-md text-label-md hover:underline decoration-2 underline-offset-4">
                Skip for now
            </button>
</div>
</main>
<!-- Visual Polish: Decorative Element -->
<div class="fixed top-0 right-0 -z-10 opacity-20 pointer-events-none">
<svg fill="none" height="400" viewbox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
<circle cx="300" cy="100" fill="url(#paint0_radial)" r="150"></circle>
<defs>
<radialgradient cx="0" cy="0" gradienttransform="translate(300 100) rotate(90) scale(150)" gradientunits="userSpaceOnUse" id="paint0_radial" r="1">
<stop stop-color="#4d6622"></stop>
<stop offset="1" stop-color="#4d6622" stop-opacity="0"></stop>
</radialgradient>
</defs>
</svg>
</div>
<!-- Micro-interaction script -->
<script>
        document.querySelectorAll('.bento-grid > div').forEach(card => {
            card.addEventListener('click', function() {
                // Remove selected states from all
                document.querySelectorAll('.bento-grid > div').forEach(c => {
                    c.classList.remove('border-2', 'border-primary', 'selected-glow');
                    c.classList.add('border', 'border-border');
                    const label = c.querySelector('.font-title-sm');
                    if(label) label.classList.replace('text-primary', 'text-on-surface');
                    const badge = c.querySelector('.bg-primary-soft');
                    if(badge) badge.remove();
                });

                // Add selected state to clicked
                this.classList.remove('border', 'border-border');
                this.classList.add('border-2', 'border-primary', 'selected-glow');
                
                const label = this.querySelector('.font-title-sm');
                if(label) label.classList.replace('text-on-surface', 'text-primary');

                // Update button text
                const categoryName = label ? label.textContent : 'Routine';
                document.querySelector('button.bg-primary').textContent = `Continue with ${categoryName}`;

                // Add small badge if not custom
                if (categoryName !== 'Custom' && !this.querySelector('.bg-primary-soft')) {
                    const badge = document.createElement('div');
                    badge.className = 'mt-xs bg-primary-soft text-primary px-3 py-0.5 rounded-full';
                    badge.innerHTML = '<span class="text-[10px] font-bold uppercase tracking-wider">Active</span>';
                    this.appendChild(badge);
                }
            });
        });
    </script>
</body></html>
