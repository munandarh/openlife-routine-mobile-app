<style>
        body {

            margin: 0;
            padding: 0;

        .material-symbols-outlined {

            display: inline-block;
            line-height: 1;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-entrance {
            animation: fadeInScale 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
    </style>

<body class="bg-background min-h-screen flex flex-col items-center justify-between text-on-background px-page-margin py-3xl">

</div>
<!-- Empty Spacer for top centering logic -->
<div class="h-10"></div>
<!-- Core Brand Identity Container -->

            Find your natural rhythm.
        </p>
<!-- Loading / Progress Indicator -->
<div class="mt-2xl flex gap-sm">
<div class="w-2 h-2 rounded-full bg-primary-container animate-pulse"></div>
<div class="w-2 h-2 rounded-full bg-primary-container animate-pulse [animation-delay:200ms]"></div>

</div>
</main>
<!-- Privacy & Open Source Footer Anchor -->

<div class="flex items-center gap-xs px-lg py-sm bg-surface-container-low rounded-full border border-border">

</div>

<p class="text-[10px] font-bold text-outline uppercase tracking-widest mt-sm">
            Stable Build v1.0.4
        </p>
</footer>
<script>
        // Simple Micro-interaction: Splash screen auto-redirect simulation
        // (In a real app, this would check auth state)
        document.addEventListener('DOMContentLoaded', () => {
            console.log('OpenLife Routine: Splash screen loaded.');
            
            // Subtle parallax effect on mouse move for desktop
            document.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) / 50;
                const moveY = (e.clientY - window.innerHeight / 2) / 50;
                const branding = document.querySelector('main');
                if(branding) {
                    branding.style.transform = `translate(${moveX}px, ${moveY}px)`;
                }
            });
        });

        // Trigger entrance animations for footer specifically since opacity is 0
        setTimeout(() => {
            const footer = document.querySelector('footer');
            if(footer) footer.style.opacity = '1';
        }, 100);
    </script>
