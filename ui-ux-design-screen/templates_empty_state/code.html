<script>
        // Micro-interaction for the CTA button
        const ctaBtn = document.querySelector('button[onclick*="Today"]');
        if (ctaBtn) {
            ctaBtn.addEventListener('click', () => {
                // Flash effect or small haptic simulation
                ctaBtn.style.opacity = '0.5';
                setTimeout(() => {
                    ctaBtn.style.opacity = '1';
                    alert('Returning you to your daily flow...');
                }, 200);
            });
        }

        // Handle navigation clicks for visual feedback in prototype
        const navButtons = document.querySelectorAll('nav button');
        navButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                navButtons.forEach(b => {
                    b.classList.remove('bg-primary-soft', 'text-primary', 'rounded-full');
                    b.classList.add('text-outline');
                });
                this.classList.remove('text-outline');
                this.classList.add('bg-primary-soft', 'text-primary', 'rounded-full');
            });
        });
